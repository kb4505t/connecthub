name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint --workspace=apps/api

      - name: Unit tests
        # apps/api/src/__tests__ runs against a mocked Prisma client (see
        # README's Phase 2 notes) — no live database needed here.
        run: npm run test --workspace=apps/api

      - name: Build
        run: npm run build:api

  web:
    name: Web (lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --workspace=apps/web

      - name: Build
        # Placeholder public values — the build only needs these to exist and
        # be well-formed (e.g. NEXT_PUBLIC_SUPABASE_URL must parse as a URL);
        # nothing here calls a real Supabase project or API at build time.
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"
          NEXT_PUBLIC_SOCKET_URL: "http://localhost:4000"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
        run: npm run build:web

  deploy-api:
    name: Deploy API to Render
    needs: [api, web] # only fires once both builds are confirmed green
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # Render's own GitHub integration can auto-deploy on push by itself —
        # this step exists so a deploy only fires *after* CI passes, instead
        # of racing a build that might fail. RENDER_DEPLOY_HOOK_URL is the
        # per-service deploy hook URL from the Render dashboard (Settings ->
        # Deploy Hook), stored as a repo secret, never committed.
        # The frontend needs no equivalent step: Vercel's GitHub App deploys
        # directly from the repo and runs its own build, independent of this
        # workflow.
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy trigger."
            exit 0
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
