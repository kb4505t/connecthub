version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: connecthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: connecthub
      POSTGRES_PASSWORD: connecthub_dev_password
      POSTGRES_DB: connecthub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connecthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: connecthub-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: connecthub-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
